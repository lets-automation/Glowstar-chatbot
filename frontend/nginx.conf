server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't advertise the exact nginx version in the Server header / error pages.
    server_tokens off;

    # Allow file uploads up to the backend's 15 MB cap. nginx's 1 MB default
    # would otherwise 413-reject any attachment between 1 MB and 15 MB.
    client_max_body_size 16m;

    # Baseline security headers (applied to all responses). NOTE: intentionally
    # NO X-Frame-Options: the app is designed to be EMBEDDED in the client's CRM
    # (an iframe), which a DENY/SAMEORIGIN would break. Restrict framing to the
    # CRM origin via a CSP frame-ancestors at deploy time if needed.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets (index-<hash>.js/css) are immutable -> cache hard.
    # (A location-level add_header drops inherited server headers, so repeat them.)
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The SPA entry must NEVER be cached, so a redeploy is picked up on the next
    # load instead of the browser serving a stale bundle (which was silently
    # hiding this very UI fix). It's tiny, so revalidating every load is free.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    # SPA: any unknown path falls back to index.html (client-side rendering).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api/* to the backend container, stripping the /api
    # prefix (the trailing slash on proxy_pass does that): a request for
    # /api/chat/stream reaches the backend as /chat/stream. This keeps the
    # browser on one origin - no CORS needed for the deployed stack.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;

        # Pass through the real client info and the Authorization header
        # (nginx forwards it by default; listed here for clarity).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # /chat/stream is Server-Sent Events - must NOT be buffered, or the
        # live "Analyzing your question..." status updates stall until the
        # whole response finishes. LLM calls can also run long, so give the
        # read timeout real headroom.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }
}
